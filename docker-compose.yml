services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nj_bid_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/nj_bid_registry
      APP_ENV: dev
      PORT: "10000"
      HOST: 0.0.0.0
      LOG_LEVEL: info
      SECRET_KEY: dev-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      CRAWL_ENABLED: "false"
    ports:
      - "10000:10000"

volumes:
  postgres_data:
